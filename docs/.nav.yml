# 최상위 내비게이션(상단 탭). awesome-nav 플러그인이 사용한다.
# 소프트웨어공학은 폴더(SWE)를 참조하므로 새 노트가 자동으로 메뉴에 추가된다.
nav:
  - 홈: index.md
  - 블로그:
      - blog/index.md
  - 노트:
      - notes/index.md
      - 마크다운 사용법: notes/markdown-guide.md
  - 독서:
      - 독서/index.md
      - 소프트웨어 공학 이론과 실제:
          - 독서/소프트웨어공학-이론과-실제/index.md
  - 소프트웨어공학: SWE
