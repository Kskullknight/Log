# =========================================================
# 사이트 기본 정보
# =========================================================
site_name: 준수의 블로그          # 사이트 제목 (원하는 이름으로 변경)
site_description: 공부 기록과 생각을 정리하는 공간
site_author: junsookim

# 배포 주소 (프로젝트 페이지 기준). 사용자명/저장소명에 맞게 수정하세요.
# 예) https://junsookim.github.io/study/
site_url: https://kskullknight.github.io/Log/

# GitHub 저장소 링크 (우측 상단 아이콘).
repo_url: https://github.com/Kskullknight/Log
repo_name: Kskullknight/Log

# =========================================================
# 테마 (Material for MkDocs)
# =========================================================
theme:
  name: material
  language: ko                    # 한국어 UI
  palette:
    # 라이트 모드
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 다크 모드로 전환
    # 다크 모드
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 라이트 모드로 전환
  features:
    - navigation.instant         # 빠른 페이지 전환
    - navigation.tracking
    - navigation.tabs            # 상단 탭 메뉴 (블로그/노트)
    - navigation.top             # 맨 위로 가기 버튼
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy          # 코드 복사 버튼
    - toc.follow
  icon:
    repo: fontawesome/brands/github

# =========================================================
# 플러그인
# =========================================================
plugins:
  - search:
      lang: ko
  - blog:
      blog_dir: blog
      post_date_format: long
      post_url_format: "{date}/{slug}"
      archive_date_format: yyyy년 MM월
      pagination_per_page: 10
  - tags

# =========================================================
# 마크다운 확장 (코드 블록, 인용, 수식 등)
# =========================================================
markdown_extensions:
  - admonition                   # !!! note 같은 강조 박스
  - pymdownx.details
  - pymdownx.superfences         # 코드 펜스 강화
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - footnotes
  - attr_list
  - md_in_html
  - toc:
      permalink: true            # 제목 옆 앵커 링크

# =========================================================
# 내비게이션 (상단 탭 구성)
# =========================================================
nav:
  - 홈: index.md
  - 블로그:
      - blog/index.md
  - 노트:
      - notes/index.md
      - 마크다운 사용법: notes/markdown-guide.md
  - 독서:
      - 독서/index.md
      - 소프트웨어 공학 이론과 실제:
          - 독서/소프트웨어공학-이론과-실제/index.md
  - 소프트웨어공학:
      - "6월 1주차": "SWE/6월 1주차.md"
      - "6월 3주차": "SWE/6월 3주차.md"
      - "생산 공학과 설계 공학": "SWE/생산 공학과 설계 공학.md"
